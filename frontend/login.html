<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini ERP Pizzeria | Login</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand-mark">MP</div>
      <p class="eyebrow">Acceso interno</p>
      <h1>Mini ERP Pizzeria</h1>
      <p class="login-copy">Sistema operativo para ventas, cocina, inventario y administracion.</p>

      <form id="loginForm" class="login-form">
        <label>
          Usuario
          <input id="username" name="username" type="text" autocomplete="username" placeholder="admin" required>
        </label>
        <label>
          Contrasena
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="admin123" required>
        </label>
        <p id="loginError" class="form-error hidden">Usuario o contrasena incorrectos.</p>
        <button class="btn btn-primary btn-full" type="submit">Iniciar sesion</button>
      </form>

      <div class="demo-users">
        <span>Usuarios demo:</span>
        <strong>admin/admin123</strong>
        <strong>cajero/cajero123</strong>
        <strong>cocina/cocina123</strong>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
