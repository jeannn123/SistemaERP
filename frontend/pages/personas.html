<section id="empleados" class="admin-section">
  <div class="toolbar">
    <div>
      <h2>Empleados</h2>
      <p class="muted">Datos del personal interno.</p>
    </div>
    <button class="btn btn-secondary" type="button">Nuevo empleado</button>
  </div>
  <div class="card table-card">
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>DNI</th><th>Telefono</th><th>Cargo</th><th>Acciones</th></tr></thead>
      <tbody id="employeesTable"></tbody>
    </table>
  </div>
</section>

<section id="usuarios" class="admin-section">
  <div class="toolbar">
    <div>
      <h2>Usuarios</h2>
      <p class="muted">Cuentas de acceso. No se eliminan, se desactivan.</p>
    </div>
    <button class="btn btn-secondary" type="button">Nuevo usuario</button>
  </div>
  <form class="card form-panel compact-form">
    <label>Username <input placeholder="cajero01"></label>
    <label>Password <input type="password" placeholder="Temporal"></label>
    <label>Rol <select id="roleOptions"></select></label>
    <label>Empleado <select id="employeeOptions"></select></label>
  </form>
  <div class="card table-card">
    <table>
      <thead><tr><th>ID</th><th>Usuario</th><th>Empleado</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody id="usersTable"></tbody>
    </table>
  </div>
</section>

<section id="proveedores" class="admin-section">
  <div class="toolbar">
    <div>
      <h2>Proveedores</h2>
      <p class="muted">Empresas que abastecen insumos.</p>
    </div>
    <button class="btn btn-secondary" type="button">Nuevo proveedor</button>
  </div>
  <div class="card table-card">
    <table>
      <thead><tr><th>RUC</th><th>Nombre</th><th>Telefono</th><th>Direccion</th><th>Acciones</th></tr></thead>
      <tbody id="suppliersTable"></tbody>
    </table>
  </div>
</section>
