<section id="pedidos" class="admin-section">
  <div class="toolbar">
    <div>
      <h2>Pedidos</h2>
      <p class="muted">Registro de pedidos generados por caja y estados operativos.</p>
    </div>
    <div class="filters">
      <label>Estado
        <select><option>Todos</option><option>Pendiente</option><option>Preparando</option><option>Atendido</option><option>Anulado</option></select>
      </label>
      <label>Fecha
        <input type="date">
      </label>
    </div>
  </div>
  <div class="card table-card">
    <table>
      <thead>
        <tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Telefono</th><th>Cajero</th><th>Estado</th><th>Subtotal</th><th>Total</th><th>Acciones</th></tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>
  <div id="orderDetail" class="detail-box hidden"></div>
</section>
