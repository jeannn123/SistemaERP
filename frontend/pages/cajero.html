<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini ERP Pizzeria | POS Cajero</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pos.css">
</head>
<body>
  <header class="pos-header">
    <div>
      <p class="eyebrow">POS interno</p>
      <h1>Registro de pedidos</h1>
    </div>
    <div class="user-box">
      <div>
        <strong id="activeUser">Cajero</strong>
        <span id="activeRole">Cajero</span>
      </div>
      <button id="logoutBtn" class="btn btn-ghost" type="button">Cerrar sesion</button>
    </div>
  </header>

  <main class="pos-layout">
    <section class="pos-column categories-panel">
      <div class="section-heading">
        <h2>Categorias</h2>
        <span class="muted">Seleccione una categoria</span>
      </div>
      <div id="categoryButtons" class="stack-list"></div>
    </section>

    <section class="pos-column products-panel">
      <div class="section-heading">
        <h2>Productos</h2>
        <span id="stockAlert" class="inline-alert hidden">Stock insuficiente para registrar este producto.</span>
      </div>
      <div id="productGrid" class="product-grid"></div>
    </section>

    <aside class="pos-column order-panel">
      <div class="section-heading">
        <h2>Pedido actual</h2>
        <button id="clearOrderBtn" class="btn btn-secondary" type="button">Cancelar</button>
      </div>

      <form id="customerForm" class="compact-form">
        <label>Cliente
          <input id="customerName" type="text" maxlength="30" placeholder="Nombre del cliente" required>
        </label>
        <label>Telefono
          <input id="customerPhone" type="tel" maxlength="15" placeholder="Opcional">
        </label>
        <label>Metodo de pago
          <select id="paymentMethod" required></select>
        </label>
      </form>

      <div id="orderItems" class="order-items empty-state">No hay productos agregados.</div>

      <div class="totals-box">
        <div><span>Subtotal</span><strong id="subtotal">S/ 0.00</strong></div>
        <div><span>IGV 18%</span><strong id="igv">S/ 0.00</strong></div>
        <div class="total-line"><span>Total</span><strong id="total">S/ 0.00</strong></div>
      </div>

      <button id="generateTicketBtn" class="btn btn-primary btn-full btn-large" type="button">Generar boleta</button>
    </aside>
  </main>

  <script type="module" src="../js/panel.js"></script>
</body>
</html>
