<section id="dashboard" class="admin-section active">
  <div class="module-layout">
    <div id="dashboardStats" class="stat-grid"></div>

    <div class="content-grid">
      <article class="card panel">
        <div class="section-heading">
          <h2>Productos mas vendidos</h2>
          <span class="muted">Segun detalle de pedidos</span>
        </div>
        <div id="topProductsChart" class="chart-bars"></div>
      </article>

      <article class="card panel">
        <div class="section-heading">
          <h2>Alertas de stock</h2>
          <span class="badge badge-warning">stock minimo</span>
        </div>
        <div id="lowStockAlerts" class="alert-list"></div>
      </article>
    </div>

    <div class="content-grid">
      <article class="card table-card">
        <div class="panel section-heading">
          <h2>Compras recientes</h2>
        </div>
        <table>
          <thead>
            <tr><th>Fecha</th><th>Proveedor</th><th>Estado</th><th>Total</th></tr>
          </thead>
          <tbody id="recentPurchases"></tbody>
        </table>
      </article>

      <article class="card table-card">
        <div class="panel section-heading">
          <h2>Movimientos recientes</h2>
        </div>
        <table>
          <thead>
            <tr><th>Fecha</th><th>Tipo</th><th>Documento</th><th>Usuario</th></tr>
          </thead>
          <tbody id="recentMovements"></tbody>
        </table>
      </article>
    </div>
  </div>
</section>
