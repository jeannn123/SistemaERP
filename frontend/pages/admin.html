<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini ERP Pizzeria | Administracion</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="erp-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark brand-mark-small">MP</div>
        <div>
          <strong>Mini ERP</strong>
          <span>Pizzeria</span>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Modulos del ERP">
        <button class="nav-item active" data-area="general" data-page="dashboard" data-section="dashboard">Dashboard</button>
        <button class="nav-item" data-area="ventas" data-page="ventas" data-section="pedidos">Pedidos</button>
        <button class="nav-item" data-area="ventas" data-page="catalogo" data-section="productos">Productos</button>
        <button class="nav-item" data-area="ventas" data-page="catalogo" data-section="recetas">Recetas</button>
        <button class="nav-item" data-area="ventas" data-page="catalogo" data-section="combos">Combos</button>
        <button class="nav-item" data-area="ventas" data-page="catalogo" data-section="promociones">Promociones</button>
        <button class="nav-item" data-area="inventario" data-page="inventario" data-section="insumos">Insumos</button>
        <button class="nav-item" data-area="inventario" data-page="inventario" data-section="compras">Compras</button>
        <button class="nav-item" data-area="inventario" data-page="inventario" data-section="movimientos">Movimientos</button>
        <button class="nav-item" data-area="inventario" data-page="inventario" data-section="kardex">Kardex</button>
        <button class="nav-item" data-area="administracion" data-page="personas" data-section="empleados">Empleados</button>
        <button class="nav-item" data-area="administracion" data-page="personas" data-section="usuarios">Usuarios</button>
        <button class="nav-item" data-area="administracion" data-page="personas" data-section="proveedores">Proveedores</button>
        <button class="nav-item" data-area="reportes" data-page="reportes" data-section="ventas">Reportes de ventas</button>
        <button class="nav-item" data-area="reportes" data-page="reportes" data-section="compras">Reportes de compras</button>
        <button class="nav-item" data-area="reportes" data-page="reportes" data-section="productos">Productos mas vendidos</button>
        <button class="nav-item" data-area="reportes" data-page="reportes" data-section="inventario">Movimientos de inventario</button>
        <button class="nav-item" data-area="reportes" data-page="reportes" data-section="anulados">Pedidos anulados</button>
      </nav>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div>
          <p class="eyebrow">Panel administrador</p>
          <h1 id="viewTitle">Dashboard</h1>
        </div>
        <div class="user-box">
          <label class="area-switcher">
            <span>Area</span>
            <select id="moduleAreaSelect">
              <option value="ventas">Ventas</option>
              <option value="inventario">Inventario</option>
              <option value="reportes">Reportes</option>
              <option value="administracion">Administracion</option>
            </select>
          </label>
          <div>
            <strong id="activeUser">Administrador</strong>
            <span id="activeRole">Administrador</span>
          </div>
          <button id="logoutBtn" class="btn btn-ghost" type="button">Cerrar sesion</button>
        </div>
      </header>

      <main id="content" class="content-area" tabindex="-1"></main>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
