<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modalEliminar(entidad, aviso)" class="modal fade" id="confirmarEliminar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" th:text="'Eliminar ' + ${entidad}">Eliminar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <p>Se eliminara <strong id="eliminarNombre">el registro</strong> de forma permanente.
           <span th:text="${aviso}">Si tiene registros asociados, la operacion sera rechazada.</span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancelar</button>
        <form id="eliminarForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn btn-danger" type="submit"><i class="bi bi-trash"></i> Eliminar</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('confirmarEliminar').addEventListener('show.bs.modal', (event) => {
      const origen = event.relatedTarget;
      document.getElementById('eliminarForm').action = origen.dataset.action;
      document.getElementById('eliminarNombre').textContent = origen.dataset.nombre;
    });
  </script>
</div>

</body>
</html>
