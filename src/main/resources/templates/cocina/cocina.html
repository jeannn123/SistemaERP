<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamma Tomato | Cocina</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/cocina.css}">
</head>
<body>
  <header class="kitchen-header role-header">
    <div class="role-brand">
      <img class="brand-logo" th:src="@{/img/logo.png}" alt="Mamma Tomato">
      <div>
        <p class="eyebrow">Pantalla cocina</p>
        <h1>Pedidos en preparacion</h1>
      </div>
    </div>
    <div class="user-box">
      <div class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">C</div>
      <div class="user-meta">
        <strong sec:authentication="name">Cocina</strong>
        <span>Cocina</span>
      </div>
      <form th:action="@{/logout}" method="post" style="margin:0">
        <button class="btn btn-ghost" type="submit"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </form>
    </div>
  </header>

  <main>
    <section id="kitchenOrders" class="kitchen-grid"></section>
  </main>

  <script type="module" th:src="@{/js/cocina.js}"></script>
</body>
</html>
