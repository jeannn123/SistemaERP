<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">

  <div class="toolbar">
    <div class="page-head">
      <h2 th:text="${editId == null} ? 'Nuevo insumo' : 'Editar insumo'">Nuevo insumo</h2>
      <p class="muted">El estado (normal/bajo) se calcula automaticamente segun el stock y el minimo.</p>
    </div>
    <a class="btn btn-ghost" th:href="@{/admin/insumos}"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>

  <form class="card form-panel" th:object="${insumoForm}" method="post"
        th:action="${editId == null} ? @{/admin/insumos} : @{/admin/insumos/{id}(id=${editId})}">
    <div class="form-grid">
      <label class="field">Codigo
        <input type="text" th:field="*{codigo}" placeholder="IN0001" maxlength="6"
               th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></span>
      </label>

      <label class="field">Nombre
        <input type="text" th:field="*{nombre}" placeholder="Queso mozzarella" maxlength="25"
               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
      </label>

      <label class="field">Unidad de medida
        <select th:field="*{idMedida}" th:classappend="${#fields.hasErrors('idMedida')} ? 'is-invalid'">
          <option value="">Seleccione...</option>
          <option th:each="m : ${medidas}" th:value="${m.idMedida}"
                  th:text="${m.descripcion} + ' (' + ${m.sigla} + ')'">Medida</option>
        </select>
        <span class="invalid-feedback" th:if="${#fields.hasErrors('idMedida')}" th:errors="*{idMedida}"></span>
      </label>

      <label class="field">Precio unitario (S/)
        <input type="number" step="0.01" min="0.01" th:field="*{precio}" placeholder="18.00"
               th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
      </label>

      <label class="field">Stock actual
        <input type="number" step="0.001" min="0" th:field="*{stock}" placeholder="4.500"
               th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
      </label>

      <label class="field">Cantidad minima
        <input type="number" step="0.001" min="0" th:field="*{cantidadMinima}" placeholder="3.000"
               th:classappend="${#fields.hasErrors('cantidadMinima')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('cantidadMinima')}" th:errors="*{cantidadMinima}"></span>
      </label>
    </div>

    <div class="form-actions">
      <a class="btn btn-ghost" th:href="@{/admin/insumos}">Cancelar</a>
      <button class="btn btn-primary" type="submit">
        <i class="bi bi-check-lg"></i>
        <span th:text="${editId == null} ? 'Guardar insumo' : 'Guardar cambios'">Guardar</span>
      </button>
    </div>
  </form>
</main>
</body>
</html>
