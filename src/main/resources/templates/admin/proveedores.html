<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">

  <div class="flash flash-success" th:if="${flash}" th:text="${flash}">ok</div>
  <div class="flash flash-danger" th:if="${flashError}" th:text="${flashError}">error</div>

  <div class="toolbar">
    <div class="page-head">
      <h2>Proveedores</h2>
      <p class="muted">Empresas que abastecen insumos.</p>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="search" data-search-for="tablaProveedores" placeholder="Buscar por nombre..." autocomplete="off">
    </div>
    <a class="btn btn-secondary" th:href="@{/admin/proveedores/nuevo}"><i class="bi bi-plus-lg"></i> Nuevo proveedor</a>
  </div>

  <div class="card table-card" id="tablaProveedores" data-table-tools>
    <table class="align-middle">
      <thead><tr><th>RUC</th><th>Nombre</th><th>Telefono</th><th>Direccion</th><th></th></tr></thead>
      <tbody>
        <tr th:each="p : ${proveedores}">
          <td th:text="${p.ruc}">20000000000</td>
          <td th:text="${p.nombre}">Proveedor</td>
          <td th:text="${p.telefono}">999999999</td>
          <td th:text="${p.direccion}">Direccion</td>
          <td>
            <div class="dropdown">
              <button class="btn btn-ghost btn-sm" type="button" data-bs-toggle="dropdown" aria-label="Opciones">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item" th:href="@{/admin/proveedores/{id}/editar(id=${p.idProveedor})}">
                    <i class="bi bi-pencil"></i> Editar
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button class="dropdown-item text-danger" type="button"
                          data-bs-toggle="modal" data-bs-target="#confirmarEliminar"
                          th:attr="data-action=@{/admin/proveedores/{id}/eliminar(id=${p.idProveedor})},data-nombre=${p.nombre}">
                    <i class="bi bi-trash"></i> Eliminar
                  </button>
                </li>
              </ul>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(proveedores)}" data-empty>
          <td colspan="5"><div class="empty-state">No hay proveedores registrados.</div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:replace="~{layout/fragments :: modalEliminar('proveedor', 'Si tiene compras registradas, la operacion sera rechazada.')}"></div>
</main>
</body>
</html>
