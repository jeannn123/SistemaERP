<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">

  <div class="flash flash-success" th:if="${flash}" th:text="${flash}">ok</div>
  <div class="flash flash-danger" th:if="${flashError}" th:text="${flashError}">error</div>

  <div class="toolbar">
    <div class="page-head">
      <h2>Insumos</h2>
      <p class="muted">Fuente real del inventario y base del Kardex.</p>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="search" data-search-for="tablaInsumos" placeholder="Buscar por nombre..." autocomplete="off">
    </div>
    <a class="btn btn-secondary" th:href="@{/admin/insumos/nuevo}"><i class="bi bi-plus-lg"></i> Nuevo insumo</a>
  </div>

  <div class="card table-card" id="tablaInsumos" data-table-tools>
    <table class="align-middle">
      <thead><tr><th>Codigo</th><th>Nombre</th><th>Unidad</th><th>Precio</th><th>Stock</th><th>Minimo</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        <tr th:each="i : ${insumos}" th:with="bajo=${i.stock.compareTo(i.cantidadMinima) <= 0}">
          <td th:text="${i.codigo}">IN0001</td>
          <td th:text="${i.nombre}">Insumo</td>
          <td th:text="${i.medida.sigla}">kg</td>
          <td th:text="'S/ ' + ${#numbers.formatDecimal(i.precio,1,'COMMA',2,'POINT')}">S/ 0.00</td>
          <td th:text="${#numbers.formatDecimal(i.stock,1,3)}">0.000</td>
          <td th:text="${#numbers.formatDecimal(i.cantidadMinima,1,3)}">0.000</td>
          <td>
            <span class="badge" th:classappend="${bajo} ? 'badge-warning' : 'badge-success'"
                  th:text="${bajo} ? 'Bajo stock' : 'Disponible'">Estado</span>
          </td>
          <td>
            <div class="dropdown">
              <button class="btn btn-ghost btn-sm" type="button" data-bs-toggle="dropdown" aria-label="Opciones">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item" th:href="@{/admin/insumos/{id}/editar(id=${i.idInsumo})}">
                    <i class="bi bi-pencil"></i> Editar
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button class="dropdown-item text-danger" type="button"
                          data-bs-toggle="modal" data-bs-target="#confirmarEliminar"
                          th:attr="data-action=@{/admin/insumos/{id}/eliminar(id=${i.idInsumo})},data-nombre=${i.nombre}">
                    <i class="bi bi-trash"></i> Eliminar
                  </button>
                </li>
              </ul>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(insumos)}" data-empty>
          <td colspan="8"><div class="empty-state">No hay insumos registrados.</div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:replace="~{layout/fragments :: modalEliminar('insumo', 'Si esta en recetas, kardex o compras, la operacion sera rechazada.')}"></div>
</main>
</body>
</html>
