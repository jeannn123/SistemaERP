<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">
  <div class="toolbar">
    <div class="page-head">
      <h2>Movimientos</h2>
      <p class="muted">Compras y ventas generan movimientos automaticos; mermas y ajustes son manuales.</p>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="search" data-search-for="tablaMovimientos" placeholder="Buscar..." autocomplete="off">
    </div>
  </div>
  <div class="card table-card" id="tablaMovimientos" data-table-tools>
    <table>
      <thead><tr><th>ID</th><th>Fecha</th><th>Tipo</th><th>Operacion</th><th>Documento</th><th>Glosa</th><th>Usuario</th></tr></thead>
      <tbody>
        <tr th:each="m : ${movimientos}">
          <td th:text="'#' + ${m.idMovimiento}">#1</td>
          <td th:text="${m.fecha}">2026-01-01</td>
          <td th:text="${m.tipoMovimiento.descripcion}">Compra</td>
          <td>
            <span class="badge" th:classappend="${m.tipoMovimiento.operacion == 'Entrada'} ? 'badge-success' : 'badge-danger'"
                  th:text="${m.tipoMovimiento.operacion}">Entrada</span>
          </td>
          <td th:text="${m.documento}">DOC</td>
          <td class="muted" th:text="${m.glosa}">Glosa</td>
          <td th:text="${m.usuario.empleado != null ? m.usuario.empleado.nombre : m.usuario.username}">Usuario</td>
        </tr>
        <tr th:if="${#lists.isEmpty(movimientos)}" data-empty>
          <td colspan="7"><div class="empty-state">No hay movimientos registrados.</div></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
