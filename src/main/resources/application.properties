# ===== Base de datos MySQL =====
# Credenciales sobreescribibles por variables de entorno (DB_USER / DB_PASSWORD)
spring.datasource.url=jdbc:mysql://localhost:3306/erp_mamatomato?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# 'validate' contrasta las entidades contra el esquema ya creado (bd/schema.sql).
# Si la validacion fallara por las columnas ENUM de MySQL, cambiar temporalmente a 'none'.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=false

# ===== MVC =====
# Habilita _method en formularios (PUT/PATCH/DELETE) para Thymeleaf
spring.mvc.hiddenmethod.filter.enabled=true
